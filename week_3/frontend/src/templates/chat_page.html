<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume Helper Chatbot</title>

    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">
    <main class="container py-4">
        <section class="card shadow-sm">
            <div class="card-header bg white">
                <h1 class="h4 mb-0">Resume Helper Chatbot</h1>
                <p class="text-muted mb-0">Upload your resume PDF and ask a career question.</p>
            </div>

            <div id="chat-box" class="card-body" style="height: 420px; overflow-y: auto;">
                <div class="d-dlex mb-3">
                    <div class="bg.secondary-subtle rounded p-3">
                        HI Upload your resume PDF and ask me abour your skill gap.
                    </div>
                </div>
            </div>

            <div class="card-footer bg white">
                <div class="mb-2">
                    <input id="resume-file" class="form-control" type="file" accept="application/pdf">
                </div>

                <div class="input-group">
                    <input
                        id="message-input"
                        class="form-control"
                        type="text"
                        placeholder="Type your question here..."
                    >
                    <button id="send-button" class="btn btn-primary" type="button">
                        Send
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const backendUrl = "{{backend_url }}";

        const chatBox = document.getElementById("chat-box");
        const messageInput = document.getElementById("message-input");
        const sendButton = document.getElementById("send-button");

        function addMessage(text, sender) {
            const wrapper = document.createElement("div");
            wrapper.className = sender === "user"
                ? "d-flex justify-content-end mb-3"
                : "d-flex justify-content-start mb-3";

            const bubble = document.createElement("div");
            bubble.className = sender === "user"
                ? "bg-primary text-white rounded p-3"
                : "bg-secondary-subtle round p-3";

            bubble.textContent = text;
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();

            if (!message){
                return;
            }
            
            addMessage(message, "user");
            messageInput.value = "";

            try {
                const response = await fetch(`${backendUrl}/chat`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        message: message,
                        resume_text: "I have experience with Python, SQL, FastAPI and PostgreSQL.",
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    addMessage(`Backend error: ${data.detail || "Request failed"}`, "assistant");
                    return;
                }

                addMessage(data.reply, "assistant");

            } catch (error) {
                console.error(error);
                addMessage(`Connection error: ${error.message}`, "assistant");
            }
        }
        
        sendButton.addEventListener("click", sendMessage);
    </script>
</body>
</html>
