<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume Helper Chatbot</title>

    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">
    <main class="container py-4">
        <section class="card shadow-sm">
            <div class="card-header bg-white">
                <h1 class="h4 mb-0">Resume Helper Chatbot</h1>
                <p class="text-muted mb-0">Upload your resume PDF and ask a career question.</p>
            </div>

            <div id="chat-box" class="card-body" style="height: 420px; overflow-y: auto;">
                <div class="d-flex justify-content-start mb-3">
                    <div class="bg-secondary-subtle rounded p-3">
                        Hi! Upload your resume PDF and ask me about your skill gap.
                    </div>
                </div>
            </div>

            <div class="card-footer bg-white">
                <div class="mb-2">
                    <input id="resume-file" class="form-control" type="file" accept="application/pdf">
                </div>

                <div class="input-group">
                    <input
                        id="message-input"
                        class="form-control"
                        type="text"
                        placeholder="Type your question here..."
                    >
                    <button id="send-button" class="btn btn-primary" type="button">
                        Send
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs" type="module"></script>

    <script type="module">
        import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs";

        pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs";

        const backendUrl = "{{ backend_url }}";

        const chatBox = document.getElementById("chat-box");
        const messageInput = document.getElementById("message-input");
        const sendButton = document.getElementById("send-button");
        const resumeFileInput = document.getElementById("resume-file");

        function addMessage(text, sender) {
            const wrapper = document.createElement("div");
            wrapper.className = sender === "user"
                ? "d-flex justify-content-end mb-3"
                : "d-flex justify-content-start mb-3";

            const bubble = document.createElement("div");
            bubble.className = sender === "user"
                ? "bg-primary text-white rounded p-3"
                : "bg-secondary-subtle rounded p-3";

            bubble.textContent = text;
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function extractPdfText(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

            let fullText = "";

            for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
                const page = await pdf.getPage(pageNumber);
                const textContent = await page.getTextContent();
                const pageText = textContent.items
                    .map((item) => item.str)
                    .join(" ");

                fullText += `${pageText}\n`;
            }

            return fullText.trim();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            const resumeFile = resumeFileInput.files[0];

            if (!message) {
                addMessage("Please type a question first.", "assistant");
                return;
            }

            if (!resumeFile) {
                addMessage("Please upload a PDF resume first.", "assistant");
                return;
            }

            addMessage(message, "user");
            messageInput.value = "";
            sendButton.disabled = true;
            sendButton.textContent = "Sending...";
                //tambah sini untuk pastikan dia baca each pdf and tak ignore the pdf
            try {
                const resumeText = await extractPdfText(resumeFile);

                if (!resumeText) {
                    addMessage("I could not extract readable text from this PDF.", "assistant");
                    return;
                }

                const response = await fetch(`${backendUrl}/chat`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        message: message,
                        resume_text: resumeText,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    addMessage(`Backend error: ${data.detail || "Request failed"}`, "assistant");
                    return;
                }

                addMessage(data.reply, "assistant");

            } catch (error) {
                console.error(error);
                addMessage(`Connection error: ${error.message}`, "assistant");
            } finally {
                sendButton.disabled = false;
                sendButton.textContent = "Send";
            }
        }

        sendButton.addEventListener("click", sendMessage);

        messageInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
